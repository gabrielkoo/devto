<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gabrielkoo · dev.to stats</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
      --text: #e4e4e4; --muted: #888; --accent: #3b49df; --chart-grid: #1f1f1f;
      --green: #22c55e; --purple: #a855f7; --orange: #f97316; --red: #ef4444;
    }
    [data-theme="light"] {
      --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0;
      --text: #1a1a1a; --muted: #666; --chart-grid: #ebebeb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; transition: background .2s, color .2s; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 960px; margin: 0 auto; padding: 16px; }

    /* Header */
    header { display: flex; align-items: center; gap: 12px; padding: 20px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    header img { width: 44px; height: 44px; border-radius: 50%; }
    header h1 { font-size: 18px; font-weight: 700; }
    header p { color: var(--muted); font-size: 13px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .header-link { font-size: 13px; color: var(--muted); white-space: nowrap; }
    .theme-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 16px; line-height: 1; }
    .theme-btn:hover { border-color: var(--accent); }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .stat-card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .stat-card .value { font-size: 26px; font-weight: 700; }
    .stat-card.views .value { color: var(--green); }
    .stat-card.reactions .value { color: var(--purple); }
    .stat-card.comments .value { color: var(--orange); }
    .stat-card.articles .value { color: var(--accent); }

    /* Global controls — two clean rows */
    .controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .controls-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .controls-label { color: var(--muted); font-size: 12px; min-width: 52px; }

    /* Buttons */
    .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .btn { background: var(--bg); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 5px 11px; font-size: 12px; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .btn:hover { border-color: var(--accent); color: var(--text); }
    .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .date-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; font-size: 12px; }
    .date-input::-webkit-calendar-picker-indicator { filter: invert(0.7); }

    /* Panels */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .panel-title { font-size: 15px; font-weight: 600; }
    .panel-subtitle { font-size: 11px; color: var(--muted); margin-left: 6px; font-weight: 400; }

    /* Chart */
    .chart-wrap { position: relative; height: 220px; }
    @media (max-width: 600px) { .chart-wrap { height: 180px; } }

    /* Two-col */
    .two-col { display: grid; grid-template-columns: 2fr 3fr; gap: 20px; }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

    /* Traffic donut */
    .donut-wrap { position: relative; height: 200px; }
    .donut-legend { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: scroll; scrollbar-width: thin; }
    .donut-legend::-webkit-scrollbar { width: 6px; }
    .donut-legend::-webkit-scrollbar-track { background: var(--bg); border-radius: 3px; }
    .donut-legend::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .donut-legend::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    @media (min-width: 641px) { .donut-legend { max-height: 400px; } }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .legend-count { color: var(--muted); }

    /* Articles list */
    .article-list { display: flex; flex-direction: column; gap: 8px; }
    .article-item { display: flex; align-items: stretch; gap: 10px; padding: 10px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
    .article-rank { font-size: 16px; font-weight: 700; color: var(--border); min-width: 22px; text-align: center; padding-top: 2px; flex-shrink: 0; }
    .article-info { flex: 1; min-width: 0; }
    .article-title { font-size: 13px; font-weight: 500; line-height: 1.4; overflow-wrap: break-word; word-break: break-word; }
    .article-meta { color: var(--muted); font-size: 11px; margin-top: 3px; }
    /* Two stats stacked: views top, reactions bottom */
    .article-stats { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; flex-shrink: 0; min-width: 48px; }
    .article-stat { font-size: 13px; font-weight: 700; }
    .article-stat.views { color: var(--green); }
    .article-stat.reactions { color: var(--purple); }

    .loading { color: var(--muted); text-align: center; padding: 32px; font-size: 13px; }
    .error-msg { color: var(--red); text-align: center; padding: 16px; font-size: 13px; }
    footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 0 16px; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <img id="avatar" src="https://avatars.githubusercontent.com/u/5065685?v=4" alt="gabrielkoo" />
    <div>
      <h1>gabrielkoo</h1>
      <p>dev.to article analytics</p>
    </div>
    <div class="header-right">
      <a class="header-link" href="https://dev.to/gabrielkoo" target="_blank">→ dev.to</a>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat-card views"><div class="label">Total Views</div><div class="value" id="val-views">—</div></div>
    <div class="stat-card reactions"><div class="label">Reactions</div><div class="value" id="val-reactions">—</div></div>
    <div class="stat-card comments"><div class="label">Comments</div><div class="value" id="val-comments">—</div></div>
    <div class="stat-card articles"><div class="label">Articles</div><div class="value" id="val-articles">—</div></div>
  </div>

  <!-- Global controls: two rows -->
  <div class="controls">
    <div class="controls-row">
      <span class="controls-label">Metric</span>
      <div class="btn-group" id="metric-toggle">
        <button class="btn active" data-metric="views">Views</button>
        <button class="btn" data-metric="reactions">Reactions</button>
      </div>
    </div>
    <div class="controls-row">
      <span class="controls-label">Range</span>
      <div class="btn-group" id="range-toggle">
        <button class="btn" data-days="7">7d</button>
        <button class="btn" data-days="30">30d</button>
        <button class="btn" data-days="90">90d</button>
        <button class="btn" data-days="180">180d</button>
        <button class="btn active" data-days="365">1y</button>
        <button class="btn" data-days="730">2y</button>
        <button class="btn" data-days="0">All</button>
        <button class="btn" data-days="custom">Custom</button>
      </div>
    </div>
    <div class="controls-row" id="custom-date-row" style="display:none">
      <span class="controls-label">From</span>
      <input type="date" id="custom-start" class="date-input" />
      <span class="controls-label">To</span>
      <input type="date" id="custom-end" class="date-input" />
    </div>
  </div>

  <!-- Activity chart -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Daily Activity</span>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="btn-group" id="stacked-toggle">
          <button class="btn active" data-stacked="false">Total</button>
          <button class="btn" data-stacked="true">Stacked &nbsp;<span id="stacked-count-wrap" style="display:none"><span id="stacked-count-toggle" style="cursor:pointer;text-decoration:underline dotted" onclick="cycleStackedCount(event)">Top <span id="stacked-count-label">3</span></span></span></button>
        </div>
        <div class="btn-group" id="cumulative-toggle">
          <button class="btn active" data-cumulative="false">Daily</button>
          <button class="btn" data-cumulative="true">Cumulative</button>
        </div>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="activity-chart"></canvas></div>
  </div>

  <div class="two-col">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Traffic Sources <span class="panel-subtitle" id="traffic-subtitle">(all-time)</span></span>
      </div>
      <div class="donut-wrap"><canvas id="traffic-chart"></canvas></div>
      <div class="donut-legend" id="traffic-legend"></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Top Articles</span>
      </div>
      <div id="articles-list" class="article-list"><div class="loading">Loading…</div></div>
    </div>
  </div>

  <footer>Data from <a href="https://github.com/gabrielkoo/devto-stats-github-action" target="_blank">devto-stats-github-action</a> · updated daily</footer>
</div>

<script>
const BASE = 'https://gabrielkoo.github.io/devto-stats-github-action/data';
const GH_API = 'https://api.github.com/repos/gabrielkoo/devto-stats-github-action/contents/data/articles';
const PALETTE = ['#3b49df','#22c55e','#a855f7','#f97316','#06b6d4','#ec4899','#eab308','#14b8a6','#f43f5e','#8b5cf6','#84cc16','#0ea5e9','#d946ef','#fb923c','#2dd4bf','#facc15','#38bdf8','#f472b6','#a3e635','#818cf8','#34d399','#fbbf24'];

let accountData = null, topData = null;
let articleFileMap = null, articleCache = {};
let activityChart = null, trafficChart = null;
let currentMetric = 'views', currentDays = 365;
let isStacked = false, stackedCount = 3, isCumulative = false;
let customStart = null, customEnd = null;

// Query params: metric, days, start, end, stacked, count, theme
function parseQueryParams() {
  const p = new URLSearchParams(window.location.search);
  const q = {};
  for (const [k, v] of p) q[k] = v;
  return q;
}

function applyQueryParams(q) {
  // metric
  if (q.metric && ['views', 'reactions'].includes(q.metric)) {
    currentMetric = q.metric;
    document.querySelectorAll('#metric-toggle .btn').forEach(b => {
      b.classList.toggle('active', b.dataset.metric === currentMetric);
    });
  }
  // days / custom dates
  if (q.days === 'custom' || (q.start && q.end)) {
    document.querySelectorAll('#range-toggle .btn').forEach(b => b.classList.remove('active'));
    const customBtn = document.querySelector('#range-toggle .btn[data-days="custom"]');
    if (customBtn) customBtn.classList.add('active');
    document.getElementById('custom-date-row').style.display = 'flex';
    if (q.start) { customStart = q.start; document.getElementById('custom-start').value = q.start; }
    if (q.end) { customEnd = q.end; document.getElementById('custom-end').value = q.end; }
    currentDays = -1; // custom mode
  } else if (q.days !== undefined) {
    const d = parseInt(q.days);
    if (!isNaN(d)) {
      currentDays = d;
      document.querySelectorAll('#range-toggle .btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.days) === d);
      });
    }
  }
  // stacked
  if (q.stacked === 'true') {
    isStacked = true;
    document.querySelectorAll('#stacked-toggle .btn').forEach(b => {
      b.classList.toggle('active', b.dataset.stacked === 'true');
    });
    document.getElementById('stacked-count-wrap').style.display = 'inline';
  }
  // count
  if (q.count && [3, 5].includes(parseInt(q.count))) {
    stackedCount = parseInt(q.count);
    document.getElementById('stacked-count-label').textContent = stackedCount;
  }
  // cumulative
  if (q.cumulative === 'true') {
    isCumulative = true;
    document.querySelectorAll('#cumulative-toggle .btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cumulative === 'true');
    });
  }
  // theme
  if (q.theme === 'light' || q.theme === 'dark') {
    document.documentElement.setAttribute('data-theme', q.theme);
    localStorage.setItem('devto-theme', q.theme);
    document.getElementById('theme-btn').textContent = q.theme === 'dark' ? '☀️' : '🌙';
  }
}

function updateURL() {
  const p = new URLSearchParams();
  if (currentMetric !== 'views') p.set('metric', currentMetric);
  if (currentDays === -1) {
    p.set('days', 'custom');
    if (customStart) p.set('start', customStart);
    if (customEnd) p.set('end', customEnd);
  } else if (currentDays !== 365) {
    p.set('days', String(currentDays));
  }
  if (isStacked) p.set('stacked', 'true');
  if (stackedCount !== 3) p.set('count', String(stackedCount));
  if (isCumulative) p.set('cumulative', 'true');
  const theme = localStorage.getItem('devto-theme') || 'dark';
  if (theme !== 'dark') p.set('theme', theme);
  const newUrl = p.toString() ? '?' + p.toString() : window.location.pathname;
  if (window.location.search !== (p.toString() ? '?' + p.toString() : '')) {
    window.history.replaceState({}, '', newUrl);
  }
}

// Theme
const savedTheme = localStorage.getItem('devto-theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('theme-btn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('devto-theme', next);
  document.getElementById('theme-btn').textContent = next === 'dark' ? '☀️' : '🌙';
  if (accountData) { renderActivity(); renderTraffic(); }
  updateURL();
}

function cssVar(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
function fmt(n) { if (n == null) return '—'; if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'k'; return String(n); }

// ── Data loading ──────────────────────────────────────────────────────────────

async function loadData() {
  // Apply query params first
  applyQueryParams(parseQueryParams());

  try {
    const [acc, top] = await Promise.all([
      fetch(`${BASE}/account.json`).then(r => r.json()),
      fetch(`${BASE}/top_articles.json`).then(r => r.json()),
    ]);
    accountData = acc; topData = top;
    loadGitHubAvatar();
    render();
  } catch (e) {
    document.querySelector('.container').insertAdjacentHTML('beforeend',
      `<div class="error-msg">Failed to load data: ${e.message}</div>`);
  }
}

async function loadGitHubAvatar() {
  try {
    const u = await fetch('https://api.github.com/users/gabrielkoo').then(r => r.json());
    if (u.avatar_url) document.getElementById('avatar').src = u.avatar_url;
  } catch (_) {}
}

async function ensureArticleFileMap() {
  if (articleFileMap) return;
  const listing = await fetch(GH_API).then(r => r.json());
  articleFileMap = {};
  for (const f of listing) {
    const m = f.name.match(/^\d+-(.+)\.json$/);
    if (m) articleFileMap[m[1]] = f.download_url;
  }
}

async function loadArticles(slugs) {
  await ensureArticleFileMap();
  const missing = slugs.filter(s => !articleCache[s] && articleFileMap[s]);
  if (missing.length) {
    await Promise.all(missing.map(async s => {
      articleCache[s] = await fetch(articleFileMap[s]).then(r => r.json());
    }));
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function filterByDays(bd) {
  if (currentDays === -1 && customStart && customEnd) {
    const start = new Date(customStart);
    const end = new Date(customEnd);
    end.setHours(23, 59, 59, 999);
    return bd.filter(d => {
      const dt = new Date(d.date);
      return dt >= start && dt <= end;
    });
  }
  if (!currentDays) return bd;
  const cutoff = new Date(Date.now() - currentDays * 86400000);
  return bd.filter(d => new Date(d.date) >= cutoff);
}

function toWeekly(bd, metric) {
  const w = {};
  for (const d of bd) {
    const dt = new Date(d.date);
    const mon = new Date(dt); mon.setDate(dt.getDate() - ((dt.getDay()+6)%7));
    const k = mon.toISOString().slice(0,10);
    w[k] = (w[k]||0) + (d[metric]||0);
  }
  return w;
}

function chartScales() {
  return {
    x: { ticks: { color: cssVar('--muted'), maxTicksLimit: 8, maxRotation: 0 }, grid: { color: cssVar('--chart-grid') } },
    y: {
      ticks: {
        color: cssVar('--muted'),
        callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v
      },
      grid: { color: cssVar('--chart-grid') }
    }
  };
}

// Build merged map: slug -> {title, org, views, reactions} from top_articles.json
function mergedArticleMap() {
  const map = {};
  for (const a of topData.by_views)    map[a.slug] = { slug: a.slug, title: a.title, org: a.org_username||'gabrielkoo', views: a.views, reactions: 0 };
  for (const a of topData.by_reaction) {
    if (map[a.slug]) map[a.slug].reactions = a.reactions;
    else map[a.slug] = { slug: a.slug, title: a.title, org: a.org_username||'gabrielkoo', views: 0, reactions: a.reactions };
  }
  return map;
}

// ── Render ────────────────────────────────────────────────────────────────────

function filterLabel() {
  if (currentDays === 0) return 'all-time';
  if (currentDays === -1 && customStart && customEnd) return `${customStart} – ${customEnd}`;
  if (currentDays === -1) return 'custom';
  return `last ${currentDays}d`;
}

function renderStats() {
  const bd = filterByDays(accountData.breakdown || []);
  const views     = bd.reduce((s, d) => s + (d.views     || 0), 0);
  const reactions = bd.reduce((s, d) => s + (d.reactions || 0), 0);
  const comments  = bd.reduce((s, d) => s + (d.comments  || 0), 0);
  document.getElementById('val-views').textContent     = fmt(views);
  document.getElementById('val-reactions').textContent = fmt(reactions);
  document.getElementById('val-comments').textContent  = fmt(comments);
  document.getElementById('val-articles').textContent  = accountData.articles;
}

function render() {
  renderStats(); renderActivity(); renderTraffic(); renderArticles();
}

function renderActivity() {
  if (isStacked) renderStackedActivity(); else renderTotalActivity();
}

function toCumulative(arr) {
  let sum = 0;
  return arr.map(v => { sum += v; return sum; });
}

function renderTotalActivity() {
  const bd = filterByDays(accountData.breakdown || []);
  let labels, data;
  if (bd.length > 180) {
    const w = toWeekly(bd, currentMetric);
    labels = Object.keys(w).sort(); data = labels.map(k => w[k]);
  } else {
    labels = bd.map(d => d.date); data = bd.map(d => d[currentMetric]||0);
  }
  if (isCumulative) data = toCumulative(data);
  const color = currentMetric === 'views' ? cssVar('--green') : cssVar('--purple');
  const sc = chartScales();
  if (isCumulative) sc.y = { ticks: { color: cssVar('--muted'), callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v }, grid: { color: cssVar('--chart-grid') } };
  const ctx = document.getElementById('activity-chart').getContext('2d');
  if (activityChart) activityChart.destroy();
  activityChart = new Chart(ctx, {
    type: isCumulative ? 'line' : 'bar',
    data: { labels, datasets: [{ data, backgroundColor: color+'99', borderColor: color, borderWidth: isCumulative ? 2 : 1, borderRadius: isCumulative ? 0 : 2, fill: isCumulative, pointRadius: 0, tension: 0.3 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { title: t => t[0].label, label: t => ` ${fmt(t.raw)} ${currentMetric}${isCumulative ? ' (cumulative)' : ''}` } } },
      scales: sc
    }
  });
}

async function renderStackedActivity() {
  // Load top 15 candidates, then rank by filtered period
  const candidates = (currentMetric === 'views' ? topData.by_views : topData.by_reaction).slice(0, 15);
  const slugs = candidates.map(a => a.slug);

  // Loading placeholder
  const ctx = document.getElementById('activity-chart').getContext('2d');
  if (activityChart) { activityChart.destroy(); activityChart = null; }
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  ctx.fillStyle = cssVar('--muted'); ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Loading article data…', ctx.canvas.width/2, ctx.canvas.height/2);

  try { await loadArticles(slugs); }
  catch (e) {
    ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
    ctx.fillStyle = cssVar('--red');
    ctx.fillText('Failed to load article data', ctx.canvas.width/2, ctx.canvas.height/2);
    return;
  }

  // Rank by filtered period
  const ranked = candidates.map(art => {
    const cached = articleCache[art.slug];
    let val = 0;
    if (cached?.breakdown) val = filterByDays(cached.breakdown).reduce((s,d) => s+(d[currentMetric]||0), 0);
    return { ...art, filteredVal: val };
  }).sort((a,b) => b.filteredVal - a.filteredVal);

  const topN = ranked.slice(0, stackedCount);
  const topSlugs = new Set(topN.map(a => a.slug));

  // Build per-article breakdowns
  const allDates = new Set();
  const bds = {};
  for (const art of ranked) {
    const cached = articleCache[art.slug];
    if (!cached?.breakdown) continue;
    bds[art.slug] = filterByDays(cached.breakdown);
    bds[art.slug].forEach(d => allDates.add(d.date));
  }
  // Also include account-level dates for "Others" calculation
  const accountBd = filterByDays(accountData.breakdown || []);
  accountBd.forEach(d => allDates.add(d.date));

  const useWeekly = allDates.size > 180;
  let labels, datasets;

  if (useWeekly) {
    const weekMaps = {};
    for (const art of topN) weekMaps[art.slug] = toWeekly(bds[art.slug]||[], currentMetric);
    const accountWeekly = toWeekly(accountBd, currentMetric);
    const allWeeks = new Set([...Object.values(weekMaps).flatMap(m => Object.keys(m)), ...Object.keys(accountWeekly)]);
    labels = Array.from(allWeeks).sort();

    datasets = topN.map((art, i) => {
      let data = labels.map(w => weekMaps[art.slug]?.[w]||0);
      if (isCumulative) data = toCumulative(data);
      return {
        label: art.title.length > 45 ? art.title.slice(0,45)+'…' : art.title,
        data, backgroundColor: PALETTE[i]+'bb', borderColor: PALETTE[i], borderWidth: isCumulative ? 2 : 1,
        ...(isCumulative ? { fill: true, pointRadius: 0, tension: 0.3 } : {}),
      };
    });

    // Others = account total - sum of top N per week
    let othersData = labels.map(w => {
      const total = accountWeekly[w] || 0;
      const topSum = topN.reduce((s, art) => s + (weekMaps[art.slug]?.[w]||0), 0);
      return Math.max(0, total - topSum);
    });
    if (isCumulative) othersData = toCumulative(othersData);
    const oi = topN.length;
    datasets.push({
      label: 'Others',
      data: othersData, backgroundColor: (PALETTE[oi]||'#666')+'88', borderColor: PALETTE[oi]||'#666', borderWidth: isCumulative ? 2 : 1,
      ...(isCumulative ? { fill: true, pointRadius: 0, tension: 0.3 } : {}),
    });
  } else {
    labels = Array.from(allDates).sort();
    // Account-level daily map
    const accountDayMap = {};
    accountBd.forEach(d => { accountDayMap[d.date] = d[currentMetric]||0; });

    datasets = topN.map((art, i) => {
      const bdMap = {};
      (bds[art.slug]||[]).forEach(d => { bdMap[d.date] = d[currentMetric]||0; });
      let data = labels.map(date => bdMap[date]||0);
      if (isCumulative) data = toCumulative(data);
      return {
        label: art.title.length > 45 ? art.title.slice(0,45)+'…' : art.title,
        data, backgroundColor: PALETTE[i]+'bb', borderColor: PALETTE[i], borderWidth: isCumulative ? 2 : 1,
        ...(isCumulative ? { fill: true, pointRadius: 0, tension: 0.3 } : {}),
      };
    });

    // Others = account total - sum of top N per day
    let othersData = labels.map(date => {
      const total = accountDayMap[date] || 0;
      const topSum = topN.reduce((s, art) => {
        const bdMap = {};
        (bds[art.slug]||[]).forEach(d => { bdMap[d.date] = d[currentMetric]||0; });
        return s + (bdMap[date]||0);
      }, 0);
      return Math.max(0, total - topSum);
    });
    if (isCumulative) othersData = toCumulative(othersData);
    const oi = topN.length;
    datasets.push({
      label: 'Others',
      data: othersData, backgroundColor: (PALETTE[oi]||'#666')+'88', borderColor: PALETTE[oi]||'#666', borderWidth: isCumulative ? 2 : 1,
      ...(isCumulative ? { fill: true, pointRadius: 0, tension: 0.3 } : {}),
    });
  }

  const sc = chartScales();
  if (isCumulative) sc.y = { ticks: { color: cssVar('--muted'), callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v }, grid: { color: cssVar('--chart-grid') } };
  activityChart = new Chart(ctx, {
    type: isCumulative ? 'line' : 'bar',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: true, labels: { color: cssVar('--text'), font: { size: 11 }, boxWidth: 12, padding: 10 } },
        tooltip: {
          mode: 'index',
          callbacks: {
            title: t => t[0].label,
            label: t => ` ${t.dataset.label}: ${fmt(t.raw)}`,
            footer: items => `Total: ${fmt(items.reduce((s,i) => s+(i.raw||0), 0))}`
          }
        }
      },
      scales: {
        x: { ...sc.x, stacked: true },
        y: { ...sc.y, stacked: true }
      }
    }
  });
}

function renderTraffic() {
  const refs = accountData.referrers || [];
  document.getElementById('traffic-subtitle').textContent = '(all-time)';
  const labels = refs.map(r => r.domain||'Direct');
  const data = refs.map(r => r.count);
  const colors = refs.map((_, i) => PALETTE[i % PALETTE.length]);
  const ctx = document.getElementById('traffic-chart').getContext('2d');
  if (trafficChart) trafficChart.destroy();
  trafficChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: cssVar('--surface'), borderWidth: 2 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: t => { const pct = (t.raw / data.reduce((a,b)=>a+b,0) * 100); return ` ${t.label}: ${fmt(t.raw)} (${pct < 1 ? pct.toFixed(1) : Math.round(pct)}%)`; } } } },
      cutout: '60%'
    }
  });
  const total = data.reduce((a,b)=>a+b,0);
  document.getElementById('traffic-legend').innerHTML = refs.map((r,i) => {
    const pct = r.count / total * 100;
    const pctStr = pct < 1 ? pct.toFixed(1) : Math.round(pct);
    return `
    <div class="legend-item">
      <div class="legend-dot" style="background:${colors[i]}"></div>
      <span class="legend-label">${r.domain||'Direct'}</span>
      <span class="legend-count">${fmt(r.count)} (${pctStr}%)</span>
    </div>`;
  }).join('');
}

async function renderArticles() {
  const el = document.getElementById('articles-list');
  const artMap = mergedArticleMap();
  const allSlugs = Object.keys(artMap).slice(0, 15);

  if (currentDays !== 0) {
    el.innerHTML = '<div class="loading">Loading…</div>';
    try { await loadArticles(allSlugs); }
    catch (e) { el.innerHTML = `<div class="error-msg">Failed: ${e.message}</div>`; return; }

    const ranked = allSlugs.map(slug => {
      const cached = articleCache[slug];
      let views = 0, reactions = 0;
      if (cached?.breakdown) {
        const bd = filterByDays(cached.breakdown);
        views    = bd.reduce((s,d) => s+(d.views||0), 0);
        reactions = bd.reduce((s,d) => s+(d.reactions||0), 0);
      }
      return { ...artMap[slug], filteredViews: views, filteredReactions: reactions };
    })
    .sort((a,b) => currentMetric === 'views' ? b.filteredViews - a.filteredViews : b.filteredReactions - a.filteredReactions)
    .slice(0, 10);

    el.innerHTML = ranked.map((a,i) => articleRow(a, i, a.filteredViews, a.filteredReactions)).join('');
  } else {
    const list = Object.values(artMap)
      .sort((a,b) => currentMetric === 'views' ? b.views - a.views : b.reactions - a.reactions)
      .slice(0, 10);
    el.innerHTML = list.map((a,i) => articleRow(a, i, a.views, a.reactions)).join('');
  }
}

function articleRow(a, i, views, reactions) {
  const url = `https://dev.to/${a.org}/${a.slug}`;
  return `
    <div class="article-item">
      <div class="article-rank">${i+1}</div>
      <div class="article-info">
        <a class="article-title" href="${url}" target="_blank">${a.title}</a>
        <div class="article-meta">${a.org}</div>
      </div>
      <div class="article-stats">
        <span class="article-stat views">${fmt(views)}</span>
        <span class="article-stat reactions">${fmt(reactions)}</span>
      </div>
    </div>`;
}

// ── Controls ──────────────────────────────────────────────────────────────────

document.getElementById('metric-toggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-metric]'); if (!btn) return;
  currentMetric = btn.dataset.metric;
  document.querySelectorAll('#metric-toggle .btn').forEach(b => b.classList.toggle('active', b===btn));
  if (accountData) { renderStats(); renderActivity(); renderArticles(); }
  updateURL();
});

document.getElementById('range-toggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-days]'); if (!btn) return;
  const days = btn.dataset.days;
  if (days === 'custom') {
    document.getElementById('custom-date-row').style.display = 'flex';
    currentDays = -1;
  } else {
    document.getElementById('custom-date-row').style.display = 'none';
    currentDays = parseInt(days);
  }
  document.querySelectorAll('#range-toggle .btn').forEach(b => b.classList.toggle('active', b===btn));
  if (accountData) { renderStats(); renderActivity(); renderTraffic(); renderArticles(); }
  updateURL();
});

// Custom date inputs
document.getElementById('custom-start').addEventListener('change', e => {
  customStart = e.target.value || null;
  if (accountData) { renderStats(); renderActivity(); renderTraffic(); renderArticles(); }
  updateURL();
});

document.getElementById('custom-end').addEventListener('change', e => {
  customEnd = e.target.value || null;
  if (accountData) { renderStats(); renderActivity(); renderTraffic(); renderArticles(); }
  updateURL();
});

document.getElementById('stacked-toggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-stacked]'); if (!btn) return;
  isStacked = btn.dataset.stacked === 'true';
  document.querySelectorAll('#stacked-toggle .btn').forEach(b => b.classList.toggle('active', b===btn));
  document.getElementById('stacked-count-wrap').style.display = isStacked ? 'inline' : 'none';
  if (accountData) renderActivity();
  updateURL();
});

document.getElementById('cumulative-toggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-cumulative]'); if (!btn) return;
  isCumulative = btn.dataset.cumulative === 'true';
  document.querySelectorAll('#cumulative-toggle .btn').forEach(b => b.classList.toggle('active', b===btn));
  if (accountData) renderActivity();
  updateURL();
});

function cycleStackedCount(e) {
  e.stopPropagation();
  stackedCount = stackedCount === 3 ? 5 : 3;
  document.getElementById('stacked-count-label').textContent = stackedCount;
  if (accountData) renderActivity();
  updateURL();
}

loadData();
</script>
